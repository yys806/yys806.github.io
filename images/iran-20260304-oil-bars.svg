<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <style>
    .title{font:700 22px sans-serif; fill:#111}
    .label{font:16px sans-serif; fill:#111}
    .small{font:13px sans-serif; fill:#444}
    .val{font:700 18px sans-serif; fill:#111}
    .grid{stroke:#ddd; stroke-width:1}
  </style>
  <rect x="0" y="0" width="800" height="360" fill="#fff"/>
  <text x="20" y="34" class="title">Oil price snapshot (CNBC, 2026-03-02)</text>
  <text x="20" y="58" class="small">Unit: USD / barrel (intraday quote in report)</text>

  <!-- chart area -->
  <g transform="translate(80,80)">
    <!-- axes -->
    <line x1="0" y1="240" x2="660" y2="240" stroke="#222" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="240" stroke="#222" stroke-width="2"/>

    <!-- grid + ticks (0..90) -->
    <g>
      <!-- 90 -->
      <line x1="0" y1="0" x2="660" y2="0" class="grid"/>
      <text x="-10" y="6" text-anchor="end" class="small">90</text>
      <!-- 60 -->
      <line x1="0" y1="80" x2="660" y2="80" class="grid"/>
      <text x="-10" y="86" text-anchor="end" class="small">60</text>
      <!-- 30 -->
      <line x1="0" y1="160" x2="660" y2="160" class="grid"/>
      <text x="-10" y="166" text-anchor="end" class="small">30</text>
      <!-- 0 -->
      <text x="-10" y="246" text-anchor="end" class="small">0</text>
    </g>

    <!-- bars (scale: 240px = 90) -->
    <!-- Brent 78.41 -> height 209.1 -->
    <rect x="140" y="30.9" width="140" height="209.1" fill="#1f77b4"/>
    <text x="210" y="24" text-anchor="middle" class="val">78.41</text>
    <text x="210" y="270" text-anchor="middle" class="label">Brent</text>

    <!-- WTI 72.01 -> height 192.0 -->
    <rect x="380" y="48.0" width="140" height="192.0" fill="#ff7f0e"/>
    <text x="450" y="41" text-anchor="middle" class="val">72.01</text>
    <text x="450" y="270" text-anchor="middle" class="label">WTI</text>
  </g>
</svg>
