# 站点级的主题覆盖配置，仅覆盖需要调整的项目

# 开启导航栏毛玻璃，并接入自定义样式文件
navbar:
  ground_glass:
    enable: true
    px: 18
    alpha: 0.68

custom_css:
  - /css/glass.css

font:
  font_family: "'Manrope', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"

color:
  body_bg_color: "#e7ecf5"
  body_bg_color_dark: "#0b1220"
