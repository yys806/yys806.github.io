name: auto-paper

on:
  schedule:
    # 每天 09:00（北京时间，UTC+8），对应 UTC 01:00
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Generate daily paper post
        run: python automation/auto_paper_bot.py
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Commit new post if exists
        run: |
          if git status --porcelain | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add source/_posts
            git commit -m "chore: add daily arxiv post"
          fi

      - name: Push changes
        if: always()
        run: |
          if git status --porcelain | grep .; then
            git push
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm ci

      - name: Hexo clean/generate/deploy
        env:
          GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
        run: |
          npx hexo clean
          npx hexo generate
          npx hexo deploy
